# =============================================================================
# Hindi (hi-IN) YouTube source list
# =============================================================================
#
# PLACEHOLDER FILE — every entry below is a TEMPLATE, not a real source.
# Do NOT run the pipeline against this file as-is. Replace each entry with
# a real, manually-watched YouTube video before downloading anything.
#
# Before adding ANY real entry to this file, you must have personally:
#   1. Watched the source video at the given start_sec–end_sec range
#   2. Confirmed exactly ONE speaker is talking for that entire range
#      (no panel, no debate, no interviewer cutting in, no audience
#      member shouting a question)
#   3. Confirmed there is no background music bed or score during the
#      range (a brief music sting before/after the range is fine, but
#      not underneath the speech itself)
#   4. Confirmed you understand the speech well enough to judge later
#      whether Sarvam's ASR transcript and emotion tag are actually
#      correct — if you can't tell whether a transcript is right, you
#      can't catch the pipeline's mistakes. This matters especially for
#      Hindi if your own fluency is closer to conversational than
#      native — be honest with yourself about which clips you can
#      actually verify by ear vs. which you'd just be guessing on.
#   5. Checked the channel's general reuse/licensing posture for a
#      public research dataset (e.g. is it an official channel known
#      to license content for reuse, or does it explicitly restrict
#      redistribution — if in doubt, skip the source rather than guess).
#      This applies with extra care to any official/government speech
#      recordings — verify reuse rights explicitly, don't assume.
#
# Field reference:
#   url                    : full YouTube watch URL
#   start_sec / end_sec    : the exact range you watched and verified
#                            (not the whole video) — feeds directly into
#                            src/downloader.py's download_segment()
#   provisional_emotion    : YOUR BEST GUESS after watching once.
#                            NOT TRUSTED — every provisional_* field gets
#                            re-checked against the Sarvam LLM tag AND
#                            your own ear during the manual audit pass
#                            (BUILD_GUIDE.md Phase 6). Treat this as a
#                            note to yourself, not a final label.
#   provisional_style      : same caveat as above — draft only.
#   expected_speaker_count : should be 1 for every entry in this file.
#                            If you ever find yourself writing anything
#                            other than 1 here, the source doesn't belong
#                            in this dataset — find a different clip.
#   source_type            : one of: news_solo_segment, standup_solo,
#                            narrated_storytelling_podcast,
#                            official_address_solo (or a new category
#                            you define and document if none fit)
#
# =============================================================================

